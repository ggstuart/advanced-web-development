<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display property</title>
    <link rel="stylesheet" href="display.css">
</head>
<body>

    <section>
        <div>block</div>
        <div>block</div>
        <div>block</div>
        <div>block</div>
    </section>

    <section>
        <div>
            Block elements can contain
            <span>inline elements</span>
            without any problems.
        </div>
    </section>


    <section>
        <div>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
        </div>
        <div>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
            <span>inline</span>
        </div>
    </section>

    <section>
        <span>
            Inline elements should not contain
            <div>block elements</div>
            as they disrupt the flow.
        </span>
    </section>


</body>
</html>
